<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Note - Smart Keeper</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen" class="modal-overlay">
        <div class="glass-card login-box">
            <div class="brand-logo">
                <i class="ph-fill ph-note-pencil"></i>
                <span>Best Note</span>
            </div>
            <p>Masukkan kode akses untuk melanjutkan</p>
            <input type="password" id="access-code" placeholder="••••••">
            <button onclick="checkAuth()" class="btn-main">Masuk</button>
        </div>
    </div>

    <div id="main-content" class="app-container hidden">
        <header class="top-nav">
            <div class="brand-logo">
                <i class="ph-fill ph-lightning"></i>
                <span>Best Note</span>
            </div>
            <div class="nav-actions">
                <button class="icon-btn" onclick="openForm()" title="Tulis Catatan">
                    <i class="ph ph-plus"></i>
                </button>
                <button class="icon-btn" onclick="loadNotes()" title="Refresh">
                    <i class="ph ph-arrows-clockwise"></i>
                </button>
                <button class="icon-btn logout" onclick="logout()" title="Keluar">
                    <i class="ph ph-sign-out"></i>
                </button>
            </div>
        </header>

        <main id="notes-grid" class="bento-grid">
            <div class="loader">Menyiapkan catatan kamu...</div>
        </main>
    </div>

    <div id="form-modal" class="modal-overlay hidden">
        <div class="glass-card modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Buat Catatan</h3>
                <button class="close-btn" onclick="closeModals()"><i class="ph ph-x"></i></button>
            </div>
            <input type="hidden" id="note-id">
            <textarea id="note-input" placeholder="Tuliskan pikiranmu di sini..."></textarea>
            <button onclick="saveNote()" id="btn-save" class="btn-main">Simpan Sekarang</button>
        </div>
    </div>

    <div id="preview-modal" class="modal-overlay hidden">
        <div class="glass-card modal-content">
            <div class="modal-header">
                <span id="preview-date" class="date-tag"></span>
                <div class="action-group">
                    <button class="action-btn edit" id="btn-edit-trigger"><i class="ph ph-pencil-simple"></i></button>
                    <button class="action-btn delete" id="btn-delete-trigger"><i class="ph ph-trash"></i></button>
                    <button class="close-btn" onclick="closeModals()"><i class="ph ph-x"></i></button>
                </div>
            </div>
            <div id="preview-body" class="preview-scroll"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
