<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bento Notes</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="login-screen" class="modal">
        <div class="modal-content" style="max-width: 320px; text-align: center;">
            <h2 class="logo">ACCESS CODE</h2>
            <input type="password" id="access-code" placeholder="Masukkan Kode" style="width:100%; padding:12px; border:3px solid #000; border-radius:10px; margin: 15px 0;">
            <button onclick="checkAuth()" class="btn-main">MASUK</button>
        </div>
    </div>

    <div id="main-content" class="container hidden">
        <nav class="navbar">
            <div class="logo">BENTO.DOCS</div>
            <div class="nav-icons">
                <i data-lucide="plus" onclick="openForm()"></i>
                <i data-lucide="refresh-cw" onclick="loadNotes()"></i>
                <i data-lucide="log-out" onclick="logout()"></i>
            </div>
        </nav>

        <div id="notes-grid" class="notes-grid"></div>
    </div>

    <div id="form-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title" style="margin:0">Catatan</h3>
                <i data-lucide="x" onclick="closeModals()" style="cursor:pointer"></i>
            </div>
            <input type="hidden" id="note-id">
            <textarea id="note-input" placeholder="Apa yang ingin kamu catat hari ini?"></textarea>
            <button onclick="saveNote()" id="btn-save" class="btn-main">SIMPAN CATATAN</button>
        </div>
    </div>

    <div id="preview-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <small id="preview-date" style="font-weight:bold"></small>
                <div style="display:flex; gap:10px">
                    <i data-lucide="edit-3" id="btn-edit-trigger" class="icon-action icon-edit"></i>
                    <i data-lucide="trash-2" id="btn-delete-trigger" class="icon-action icon-delete"></i>
                    <i data-lucide="x" onclick="closeModals()" style="cursor:pointer"></i>
                </div>
            </div>
            <div id="preview-body" class="scrollable"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
